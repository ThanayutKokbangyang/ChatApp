server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # *** บรรทัดที่ขาดไป — สำคัญสุด ***
    # ทำให้ nginx รู้จัก MIME type ของ .css .js .json ฯลฯ
    include /etc/nginx/mime.types;

    # MIME type ของ wasm (mime.types มาตรฐานบางตัวไม่มี wasm)
    types {
        application/wasm wasm;
    }

    # ไฟล์ framework ของ Blazor — เสิร์ฟตรงๆ ห้าม fallback
    location /_framework/ {
        try_files $uri =404;
    }

    # routing หลัก
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types application/javascript application/wasm application/octet-stream text/css text/plain application/json;
}