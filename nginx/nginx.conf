# =====================================================================
# Nginx Reverse Proxy + HTTPS Gateway
# ---------------------------------------------------------------------
# หน้าที่หลัก:
#   1. รับ traffic ทั้งหมดที่ port 443 (HTTPS) และ port 80 (redirect → HTTPS)
#   2. ทำ TLS termination — decrypt HTTPS แล้วส่ง HTTP ภายในไปยัง backend
#   3. routing ไปยัง service ที่เหมาะสมตาม URL path:
#       /         → Blazor WASM (static files)
#       /auth/    → AuthService
#       /chat/    → ChatService (REST API + uploads/avatars)
#       /hubs/    → ChatService (SignalR WebSocket)
#   4. WebSocket upgrade — แปลง HTTP → WS protocol สำหรับ SignalR
#
# DESIGN PATTERN: API Gateway Pattern
#   Nginx ทำหน้าที่เป็น single entry point ของระบบ
#   client ไม่ต้องรู้ว่า service ไหนอยู่ port ไหน
# =====================================================================

# ===== events block: ตั้งค่า connection handling =====
events {
    # จำนวน concurrent connections ที่ worker process รับได้
    worker_connections 1024;
}

# ===== http block: HTTP/HTTPS configuration =====
http {
    # mime types สำหรับ static files
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WebAssembly mime type (จำเป็นสำหรับ Blazor)
    types {
        application/wasm wasm;
    }

    # log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # general performance settings
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;  # อนุญาตให้ upload ไฟล์ได้ถึง 10 MB

    # compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm application/octet-stream;

    # =====================================================================
    # Upstream definitions — กำหนด backend services
    # ---------------------------------------------------------------------
    # ชื่อ "auth-service" และ "chat-service" ตรงกับ service name
    # ใน docker-compose.yml ซึ่ง Docker DNS จะ resolve ให้อัตโนมัติ
    # =====================================================================
    upstream auth_service {
        server auth-service:5000;
    }

    upstream chat_service {
        server chat-service:5001;
    }

    upstream blazor_web {
        server web:80;
    }

    # =====================================================================
    # WebSocket connection upgrade map
    # ---------------------------------------------------------------------
    # SignalR ใช้ WebSocket ซึ่งต้อง HTTP upgrade
    # map นี้แปลง header "Upgrade" ของ request เป็นค่าที่เหมาะสม:
    #   - ถ้า client ส่ง "Upgrade: websocket" → ตอบ "Connection: upgrade"
    #   - ถ้าไม่ส่ง → ตอบ "Connection: close"
    # =====================================================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # =====================================================================
    # HTTP → HTTPS redirect
    # ---------------------------------------------------------------------
    # ทุก request ที่เข้ามาที่ port 80 ถูก redirect ไป HTTPS อัตโนมัติ
    # บังคับให้ใช้ encryption ทั้งหมด (HSTS-style enforcement)
    # =====================================================================
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # =====================================================================
    # HTTPS Server — main entry point
    # =====================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # ===== SSL/TLS Certificate =====
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # ===== TLS Best Practices =====
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # =====================================================================
        # Security Headers — ลด attack surface
        # ---------------------------------------------------------------------
        # HSTS: บังคับ browser ใช้ HTTPS ตลอด 1 ปี
        # X-Frame-Options: ป้องกัน clickjacking
        # X-Content-Type-Options: ป้องกัน MIME sniffing
        # =====================================================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # =====================================================================
        # Route 1: Auth Service
        # ---------------------------------------------------------------------
        # /auth/api/auth/login → proxy ไปที่ auth-service:5000/api/auth/login
        # ใช้ trailing slash ทั้งใน location และ proxy_pass
        # ทำให้ /auth/ ถูก strip ออกก่อนส่งไป backend
        # =====================================================================
        location /auth/ {
            proxy_pass http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =====================================================================
        # Route 2: Chat Service REST API + static files (avatar images)
        # ---------------------------------------------------------------------
        # /chat/api/rooms → chat-service:5001/api/rooms
        # /chat/uploads/avatars/xxx.jpg → chat-service:5001/uploads/avatars/xxx.jpg
        # =====================================================================
        location /chat/ {
            proxy_pass http://chat_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # client_max_body_size ที่นี่ override ค่า global
            # สำหรับ avatar upload (ทาง /chat/api/profile/avatar)
            client_max_body_size 5M;
        }

        # =====================================================================
        # Route 3: SignalR WebSocket
        # ---------------------------------------------------------------------
        # /hubs/chat → chat-service:5001/hubs/chat
        # *** สำคัญมาก *** ต้องส่ง Upgrade + Connection headers
        # ให้ Nginx รู้ว่านี่คือ WebSocket connection
        #
        # ห้ามใช้ proxy_pass แบบมี trailing slash เพราะจะทำให้ path ที่ส่งต่อ
        # ไม่มี /hubs prefix และ SignalR จะหา hub endpoint ไม่เจอ
        # =====================================================================
        location /hubs/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;

            # ===== WebSocket upgrade headers =====
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # ===== forward original client info =====
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ===== WebSocket-specific timeouts =====
            # connection อาจ idle นานๆ ระหว่างที่ user ไม่พิมพ์อะไร
            # ตั้งไว้ 1 ชั่วโมงเพื่อกันไม่ให้ Nginx kill connection
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # disable buffering สำหรับ real-time streaming
            proxy_buffering off;
        }

        # =====================================================================
        # Route 4: Blazor WebAssembly (default route)
        # ---------------------------------------------------------------------
        # ทุก request ที่ไม่ match route ข้างบนถูกส่งไปที่ Blazor
        # try_files: ถ้าหา file/folder ไม่เจอ → fallback ไป /index.html
        # ทำให้ Blazor's client-side routing ทำงานได้ (เช่น /chat/{id})
        # =====================================================================
        location / {
            proxy_pass http://blazor_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
